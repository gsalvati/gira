<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="config.heading">Settings - GIRA</title>
    <link rel="stylesheet" href="style.css">
    <script src="i18n.js"></script>
</head>

<body>
    <!-- Header: title + language switcher -->
    <div style="display:flex; justify-content:center; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:4px; padding:0 16px;">
        <h1 style="margin:0;" data-i18n="config.heading">Settings - GIRA</h1>
        <div id="langSwitcher" style="display:flex; gap:6px;">
            <button class="lang-btn" data-lang="en" onclick="setLang('en')"
                style="padding:5px 11px; border-radius:6px; border:1px solid #333; background:#111; cursor:pointer; font-size:0.8rem; transition:0.2s;">
                🇺🇸 EN
            </button>
            <button class="lang-btn" data-lang="pt" onclick="setLang('pt')"
                style="padding:5px 11px; border-radius:6px; border:1px solid #333; background:#111; cursor:pointer; font-size:0.8rem; transition:0.2s;">
                🇧🇷 PT
            </button>
            <button class="lang-btn" data-lang="es" onclick="setLang('es')"
                style="padding:5px 11px; border-radius:6px; border:1px solid #333; background:#111; cursor:pointer; font-size:0.8rem; transition:0.2s;">
                🇪🇸 ES
            </button>
        </div>
    </div>

    <div style="max-width:1000px; margin:0 auto; display:flex; gap:20px; align-items:flex-start;">
        <!-- Vertical Tabs -->
        <div id="configTabs" style="width:160px; background:transparent; display:flex; flex-direction:column; gap:8px;">
            <button class="tabBtn active" data-section="liftSection"    style="padding:12px; border-radius:8px; background:#222; color:#fff; border:1px solid #333; text-align:left;" data-i18n="tab.lift">Lift</button>
            <button class="tabBtn"        data-section="tonearmSection" style="padding:12px; border-radius:8px; background:#111; color:#ddd; border:1px solid #222; text-align:left;" data-i18n="tab.tonearm">Tonearm</button>
            <button class="tabBtn"        data-section="timingSection"  style="padding:12px; border-radius:8px; background:#111; color:#ddd; border:1px solid #222; text-align:left;" data-i18n="tab.timing">Timing</button>
            <button class="tabBtn"        data-section="filesSection"   style="padding:12px; border-radius:8px; background:#111; color:#ddd; border:1px solid #222; text-align:left;" data-i18n="tab.files">Files</button>
            <button class="tabBtn"        data-section="allSections"    style="padding:12px; border-radius:8px; background:#111; color:#ddd; border:1px solid #222; text-align:left;" data-i18n="tab.showall">Show All</button>
        </div>

        <!-- Sections container -->
        <div style="flex:1;">
            <div id="liftSection" class="configSection" style="background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:18px;">
                <h3 style="margin-top:0;" data-i18n="lift.title">Lift (Servo)</h3>
                <p style="color:#aaa; margin:6px 0 12px 0;" data-i18n="lift.hint">Use the slider to adjust visually; fine-tune with the number field.</p>

                <label style="display:block; color:#ccc;">
                    <span data-i18n="lift.raised">Raised (liftMax):</span> <span id="liftMaxDisplay">80.0</span>°
                </label>
                <input type="range" id="liftMaxRange" min="0" max="180" step="0.1" value="80.0" style="width:100%;">
                <input type="number" id="liftMax" step="0.1" value="80.0" style="width:100%; margin-top:8px; background:#111; color:#fff; border:1px solid #333; padding:6px; border-radius:6px;">

                <hr style="border-color:#2a2a2a; margin:12px 0;">

                <label style="display:block; color:#ccc;">
                    <span data-i18n="lift.lowered">Lowered (liftMin):</span> <span id="liftMinDisplay">120.0</span>°
                </label>
                <input type="range" id="liftMinRange" min="0" max="180" step="0.1" value="120.0" style="width:100%;">
                <input type="number" id="liftMin" step="0.1" value="120.0" style="width:100%; margin-top:8px; background:#111; color:#fff; border:1px solid #333; padding:6px; border-radius:6px;">
            </div>

            <div id="tonearmSection" class="configSection" style="display:none; margin-top:16px; background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:18px;">
                <h3 style="margin-top:0;" data-i18n="tonearm.title">Tonearm</h3>
                <p style="color:#aaa; margin:6px 0 12px 0;" data-i18n="tonearm.hint">Set the angle limits that control motor on/off.</p>

                <label style="display:block; color:#ccc;">
                    <span data-i18n="tonearm.max">Max angle (vertical):</span> <span id="tonearmMaxDisplay">160.0</span>°
                </label>
                <input type="range" id="tonearmMaxRange" min="130" max="179" step="0.1" value="160.0" style="width:100%;">
                <input type="number" id="tonearmMax" step="0.1" min="0" max="180" value="160.0" style="width:100%; margin-top:8px; background:#111; color:#fff; border:1px solid #333; padding:6px; border-radius:6px;">

                <hr style="border-color:#2a2a2a; margin:12px 0;">

                <label style="display:block; color:#ccc;">
                    <span data-i18n="tonearm.min">Min angle (center):</span> <span id="tonearmMinDisplay">125.0</span>°
                </label>
                <input type="range" id="tonearmMinRange" min="90" max="160" step="0.1" value="125.0" style="width:100%;">
                <input type="number" id="tonearmMin" step="0.1" min="0" max="180" value="125.0" style="width:100%; margin-top:8px; background:#111; color:#fff; border:1px solid #333; padding:6px; border-radius:6px;">
            </div>

            <div id="timingSection" class="configSection" style="display:none; margin-top:16px; background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:18px;">
                <h3 style="margin-top:0;" data-i18n="timing.title">Timing &amp; Debounce</h3>
                <p style="color:#aaa; margin:6px 0 12px 0;" data-i18n="timing.hint">Timing controls that affect automatic behavior.</p>

                <label style="display:block; color:#ccc;">
                    <span data-i18n="timing.debounce">Debounce (s):</span> <span id="debounceDisplay">2.0</span>s
                </label>
                <input type="range" id="debounceRange" min="0.5" max="10" step="0.1" value="2.0" style="width:100%;">
                <input type="number" id="debounceSec" step="0.1" min="0.5" max="10" value="2.0" style="width:100%; margin-top:8px; background:#111; color:#fff; border:1px solid #333; padding:6px; border-radius:6px;">

                <hr style="border-color:#2a2a2a; margin:12px 0;">

                <label style="display:block; color:#ccc;">
                    <span data-i18n="timing.rise">Rise time (ms):</span> <span id="tempoSubidaDisplay">2400</span>
                </label>
                <input type="range" id="tempoSubidaRange" min="0" max="5000" step="100" value="2400" style="width:100%;">
                <input type="number" id="tempoSubida" step="1" min="0" value="2400" style="width:100%; margin-top:8px; background:#111; color:#fff; border:1px solid #333; padding:6px; border-radius:6px;">

                <label style="display:block; color:#ccc; margin-top:10px;">
                    <span data-i18n="timing.fall">Fall time (ms):</span> <span id="tempoDescidaDisplay">1200</span>
                </label>
                <input type="range" id="tempoDescidaRange" min="0" max="5000" step="100" value="1200" style="width:100%;">
                <input type="number" id="tempoDescida" step="1" min="0" value="1200" style="width:100%; margin-top:8px; background:#111; color:#fff; border:1px solid #333; padding:6px; border-radius:6px;">
            </div>

            <div id="filesSection" class="configSection" style="display:none; margin-top:16px; background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:18px;">
                <h3 style="margin-top:0;" data-i18n="files.title">File Manager (LittleFS)</h3>
                <div id="fileList" style="background:#1a1a1a; padding:10px; border-radius:5px; text-align:left; max-width:100%;">
                    <p data-i18n="files.loading">Loading files...</p>
                </div>
                <br>
                <div style="background:#1a1a1a; padding:10px; border-radius:5px; text-align:center;">
                    <input type="file" id="fileInput" style="margin-bottom:10px;">
                    <br>
                    <button class="btn" style="background:#2ecc71; color:white; padding:10px 20px; font-size:16px; margin-top:8px;" onclick="uploadFile()" data-i18n="files.upload_btn">UPLOAD FILE</button>
                    <p id="uploadStatus"></p>
                </div>
            </div>

            <div style="display:flex; gap:12px; margin-top:18px;">
                <button class="btn btn-config" onclick="salvar()" style="flex:1;" data-i18n="btn.save">SAVE SETTINGS</button>
                <button class="btn" style="background:#444; color:white; padding:10px 16px; border-radius:8px;" onclick="location.href='/'" data-i18n="btn.back">BACK</button>
            </div>
        </div>
    </div>

    <hr style="border-color:#2a2a2a; margin:0 auto; max-width:80%;">
    <br>
    <button class="btn" style="background:#1a1a2e; color:#aaa; border:1px solid #333;"
        onclick="location.href='/wifi.html'" data-i18n="btn.wifi">⚙️ CHANGE WIFI NETWORK</button>
    <p id="status"></p>

    <script>
        function bindRangeNumber(rangeId, numId, displayId, fmt) {
            const range = document.getElementById(rangeId);
            const num = document.getElementById(numId);
            const disp = document.getElementById(displayId);
            if (!range || !num || !disp) return;
            const updateDisplay = (v) => { disp.innerText = (fmt ? fmt(v) : v); };
            range.addEventListener('input', () => { num.value = range.value; updateDisplay(range.value); });
            num.addEventListener('input', () => { range.value = num.value; updateDisplay(num.value); });
            updateDisplay(num.value);
        }

        function fetchAndPopulate() {
            fetch('/get_config').then(r => r.json()).then(data => {
                if (data.liftMax !== undefined) {
                    document.getElementById('liftMax').value = data.liftMax;
                    document.getElementById('liftMaxRange').value = data.liftMax;
                    document.getElementById('liftMaxDisplay').innerText = data.liftMax;
                }
                if (data.liftMin !== undefined) {
                    document.getElementById('liftMin').value = data.liftMin;
                    document.getElementById('liftMinRange').value = data.liftMin;
                    document.getElementById('liftMinDisplay').innerText = data.liftMin;
                }
                if (data.tonearmMax !== undefined) {
                    document.getElementById('tonearmMax').value = data.tonearmMax;
                    document.getElementById('tonearmMaxRange').value = data.tonearmMax;
                    document.getElementById('tonearmMaxDisplay').innerText = data.tonearmMax;
                }
                if (data.tonearmMin !== undefined) {
                    document.getElementById('tonearmMin').value = data.tonearmMin;
                    document.getElementById('tonearmMinRange').value = data.tonearmMin;
                    document.getElementById('tonearmMinDisplay').innerText = data.tonearmMin;
                }
                if (data.debounceSec !== undefined) {
                    document.getElementById('debounceSec').value = data.debounceSec;
                    document.getElementById('debounceRange').value = data.debounceSec;
                    document.getElementById('debounceDisplay').innerText = data.debounceSec;
                }
                if (data.tempoSubida !== undefined) {
                    document.getElementById('tempoSubida').value = data.tempoSubida;
                    document.getElementById('tempoSubidaRange').value = data.tempoSubida;
                    document.getElementById('tempoSubidaDisplay').innerText = data.tempoSubida;
                }
                if (data.tempoDescida !== undefined) {
                    document.getElementById('tempoDescida').value = data.tempoDescida;
                    document.getElementById('tempoDescidaRange').value = data.tempoDescida;
                    document.getElementById('tempoDescidaDisplay').innerText = data.tempoDescida;
                }
            }).catch(e => console.warn('Error fetching config', e));
        }

        function salvar() {
            const liftMax    = document.getElementById("liftMax").value;
            const liftMin    = document.getElementById("liftMin").value;
            const tonearmMax = document.getElementById("tonearmMax").value;
            const tonearmMin = document.getElementById("tonearmMin").value;
            const debounceSec  = document.getElementById("debounceSec").value;
            const tempoSubida  = document.getElementById("tempoSubida").value;
            const tempoDescida = document.getElementById("tempoDescida").value;
            fetch("/salvar?liftMax=" + liftMax + "&liftMin=" + liftMin +
                  "&tonearmMax=" + tonearmMax + "&tonearmMin=" + tonearmMin +
                  "&debounce=" + debounceSec +
                  "&tempoSubida=" + tempoSubida + "&tempoDescida=" + tempoDescida)
                .then(r => r.text()).then(txt => {
                    document.getElementById("status").innerText = txt;
                    fetchAndPopulate();
                });
        }

        function loadFiles() {
            fetch("/list").then(r => r.json()).then(files => {
                let html = "<ul style=\"list-style:none; padding:0;\">";
                if (files.length === 0) html += "<li>" + t('files.none') + "</li>";
                files.forEach(f => {
                    html += `<li>📄 <b>${f.name}</b> (${(f.size / 1024).toFixed(2)} KB)</li>`;
                });
                html += "</ul>";
                document.getElementById("fileList").innerHTML = html;
            }).catch(() => {
                document.getElementById("fileList").innerHTML = "<p>" + t('files.error') + "</p>";
            });
        }

        function uploadFile() {
            const input = document.getElementById("fileInput");
            if (input.files.length === 0) return;
            const file = input.files[0];
            const data = new FormData();
            data.append("file", file, "/" + file.name);
            document.getElementById("uploadStatus").innerText = t('files.uploading');
            fetch("/upload", { method: "POST", body: data }).then(r => {
                if (r.ok) {
                    document.getElementById("uploadStatus").innerText = t('files.uploaded');
                    loadFiles();
                } else {
                    document.getElementById("uploadStatus").innerText = t('files.upload_error');
                }
            });
        }

        function showSection(name) {
            const sections = ['liftSection','tonearmSection','timingSection','filesSection'];
            if (name === 'allSections') {
                sections.forEach(s => { const el = document.getElementById(s); if (el) el.style.display = ''; });
            } else {
                sections.forEach(s => { const el = document.getElementById(s); if (el) el.style.display = (s === name) ? '' : 'none'; });
            }
            document.querySelectorAll('#configTabs .tabBtn').forEach(btn => {
                if (btn.dataset.section === name) {
                    btn.classList.add('active'); btn.style.background = '#222'; btn.style.color = '#fff';
                } else {
                    btn.classList.remove('active'); btn.style.background = '#111'; btn.style.color = '#ddd';
                }
            });
        }

        document.querySelectorAll('#configTabs .tabBtn').forEach(btn => {
            btn.addEventListener('click', () => showSection(btn.dataset.section));
        });

        (function initConfigUI() {
            bindRangeNumber('liftMaxRange',    'liftMax',    'liftMaxDisplay',    (v) => parseFloat(v).toFixed(1));
            bindRangeNumber('liftMinRange',    'liftMin',    'liftMinDisplay',    (v) => parseFloat(v).toFixed(1));
            bindRangeNumber('tonearmMaxRange', 'tonearmMax', 'tonearmMaxDisplay', (v) => parseFloat(v).toFixed(1));
            bindRangeNumber('tonearmMinRange', 'tonearmMin', 'tonearmMinDisplay', (v) => parseFloat(v).toFixed(1));
            bindRangeNumber('debounceRange',   'debounceSec','debounceDisplay',   (v) => parseFloat(v).toFixed(1));
            bindRangeNumber('tempoSubidaRange','tempoSubida','tempoSubidaDisplay',(v) => parseInt(v));
            bindRangeNumber('tempoDescidaRange','tempoDescida','tempoDescidaDisplay',(v) => parseInt(v));

            loadFiles();
            fetchAndPopulate();
            showSection('liftSection');
        })();
    </script>
</body>

</html>
